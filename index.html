<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cha-syuOS v0.6</title>

<style>
/* ===== 基本安定設定 ===== */
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:Segoe UI, sans-serif;
  background:black;
}

/* ===== 画面共通 ===== */
.screen{
  display:none;
  width:100%;
  height:100dvh; /* iOS安定 */
  box-sizing:border-box;
}

/* ===== Desktop ===== */
#desktop{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:20px;
}

.app-icon{
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  margin:20px;
  cursor:pointer;
  font-size:40px;
}

/* ===== Game ===== */
#gameContainer{
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ===== Music ===== */
#musicContainer{
  background:black;
  color:white;
  padding:20px;
  overflow:auto;
}

/* ===== Buttons ===== */
button{
  padding:10px 20px;
  margin-top:20px;
  font-size:16px;
}
</style>
</head>

<body>

<!-- ===== Desktop ===== -->
<div id="desktop" class="screen">
  <h2>cha-syuOS</h2>

  <div class="app-icon" onclick="openGame()">🎮 Game</div>
  <div class="app-icon" onclick="openMusic()">🎵 Music</div>
</div>

<!-- ===== Game ===== -->
<div id="gameContainer" class="screen">
  <h2>Game Screen</h2>
  <p>ここにCanvasを入れる</p>
  <button onclick="showScreen('desktop')">ホームに戻る</button>
</div>

<!-- ===== Music ===== -->
<div id="musicContainer" class="screen">
  <h2>Music Player</h2>

  <input type="file" id="musicFile" accept="audio/*">
  <br><br>

  <audio id="audioPlayer" controls style="width:100%;"></audio>

  <button onclick="showScreen('desktop')">ホームに戻る</button>
</div>

<script>
/* ===== 画面切替システム ===== */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(screen=>{
    screen.style.display="none";
  });
  document.getElementById(id).style.display="block";
}

/* ===== 起動時 ===== */
showScreen("desktop");

/* ===== Game ===== */
function openGame(){
  showScreen("gameContainer");
}

/* ===== Music ===== */
function openMusic(){
  showScreen("musicContainer");
}

/* ===== 音楽再生 ===== */
const musicFile = document.getElementById("musicFile");
const audioPlayer = document.getElementById("audioPlayer");

musicFile.addEventListener("change", function(){
  const file = this.files[0];
  if(file){
    const url = URL.createObjectURL(file);
    audioPlayer.src = url;
    audioPlayer.play();
  }
});
</script>

</body>
</html>
