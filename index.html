<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="icon.PNG">
<link rel="apple-touch-icon" href="icon.PNG">
<meta charset="UTF-8">
<title>cha-syuOS v0.5</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:black;
}

/* Terminal Boot */
#terminalBoot{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  color:#00ff00;
  font-family:monospace;
  padding:20px;
}

/* Logo Boot */
#boot{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  background:black;
  opacity:0;
  animation:bootFade 4s ease forwards;
}
#boot img{
  max-width:1200px;
}
@keyframes bootFade{
  0%{opacity:0;}
  20%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;}
}

/* Login */
#login{
  display:none;
  height:100vh;
  background:linear-gradient(135deg,#141e30,#243b55);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

/* Desktop */
#desktop{
  display:none;
  height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  position:relative;
  color:white;
}

/* Icons */
.iconArea{
  display:flex;
  padding:20px;
}
.icon{
  width:80px;
  text-align:center;
  cursor:pointer;
  margin:20px;
}

/* App Icon */
.app-icon {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  width:80px;
  margin:20px;
  cursor: pointer;
}
.app-icon .icon {
  font-size: 40px;
  line-height: 1;
  text-align: center;
}
.app-icon .label {
  font-size: 14px;
  margin-top: 4px;
  text-align: center;
  color: white;
}

/* Taskbar */
#taskbar{
  position:absolute;
  bottom:0;
  width:100%;
  height:50px;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  padding:0 20px;
  box-sizing:border-box;
}
#startBtn{cursor:pointer;}
#clock{
  font-size:20px;
  margin-left:auto;
  margin-right:10px;
}
/* Start Menu */
#startMenu{
  position:absolute;
  bottom:50px;
  left:20px;
  background:rgba(0,0,0,0.8);
  padding:10px;
  display:none;
}

/* Window */
.window{
  position:absolute;
  top:120px;
  left:120px;
  width:300px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

/* Game Container */
#gameContainer{
  display:none;
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
}
#gameContainer canvas{
  display:block;
}

/* Buttons */
#restartBtn, #homeBtn{
  position:absolute;
  left:50%;
  padding:15px 30px;
  font-size:30px;
  cursor:pointer;
  display:none;
  transform:translate(-50%,0);
}
#restartBtn{top:60%;}
#homeBtn{top:70%;}
</style>
</head>

<body>
<div id="terminalBoot"></div>

<div id="boot">
<img id="logoImage" src="os-logo.PNG">
</div>

<div id="login">
  <h2>Login to cha-syuOS v0.5</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <br><br>
  ロゴ変更:
  <input type="file" accept="image/*" onchange="setLogo(event)">
</div>


  
<div id="desktop">
  <!-- Gameアイコン -->
  <div class="app-icon" onclick="openGame()">
    <div class="icon">🟩</div>
    <div class="label">Game</div>
  </div>
  <div class="app-icon" onclick="openNotepad()">
  <div class="icon">📝</div>
  <div class="label">Note</div>
</div>
<div class="app-icon" onclick="openMusic()">
  <div class="icon">🎵</div>
  <div class="label">Music</div>
</div>
  <div class="app-icon" onclick="openFileManager()">
  <div class="icon">📁</div>
  <div class="label">Files</div>
</div>
  <div class="app-icon" onclick="openCalculator()">
  <div class="icon">🧮</div>
  <div class="label">Calc</div>
</div>
  <div class="app-icon" onclick="openSettings()">
  <div class="icon">⚙️</div>
  <div class="label">Settings</div>
</div>
<div class="app-icon" onclick="openOnlineDoc()">
  <div class="icon">🌐</div>
  <div class="label">Document</div>
</div>
<div class="app-icon" onclick="openTimeApp()">
  <div class="icon">⏰</div>
  <div class="label">Time</div>
</div>
  <div class="app-icon" onclick="openTerminal()">
  <div class="icon">🐧</div>
  <div class="label">Terminal</div>
</div>

  <div id="taskbar">
    <div id="startBtn" onclick="toggleStart()">Start</div>
    <div id="clock"></div>
  </div>

  <div id="startMenu">
    <div onclick="openNotepad()">Notepad</div>

    </div>
  </div>
</div>


  
<!-- Game Container -->
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <button id="restartBtn">リスタート</button>
  <button id="homeBtn">ホームに戻る</button>
</div>
<div id="musicContainer"
style="
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
color:white;
padding-top:80px;
padding-left:20px;
padding-right:20px;
padding-bottom:20px;
box-sizing:border-box;
overflow:auto;
z-index:9999;">
  <h2>Music Player</h2>

  <input type="file" id="musicFile" accept="audio/*">
  <br><br>

 <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>
  <br><br>

  <button onclick="closeMusic()">ホームに戻る</button>
</div>

  


  
  <script>
// ------------------ 起動アニメ ------------------
window.onload = function(){
  var savedLogo = localStorage.getItem("logo");
  if(savedLogo){document.getElementById("logoImage").src = savedLogo;}
};

var terminal = document.getElementById("terminalBoot");
var boot = document.getElementById("boot");
var loginScreen = document.getElementById("login");
var desktop = document.getElementById("desktop");

terminal.innerHTML = "Initializing cha-syuOS v0.5...<br>";
setTimeout(()=>{terminal.innerHTML+="Loading kernel...<br>";},500);
setTimeout(()=>{terminal.innerHTML+="Starting services...<br>";},1000);
setTimeout(()=>{
  terminal.style.display="none";
  boot.style.display="flex";
},2000);
setTimeout(()=>{
  boot.style.display="none";
  loginScreen.style.display="flex";
},6000);

// ------------------ Login ------------------
function login(){
  if(document.getElementById("password").value==="ramen"){
    loginScreen.style.display="none";
    desktop.style.display="block";
    loadSaved();
  }else{alert("Wrong password");}
}


    
// ------------------ Windows ------------------
function createWindow(title,content){

  var win=document.createElement("div");
  win.className="window";

  win.innerHTML = `
    <div class="window-header" style="
      cursor:move;
      background:rgba(0,0,0,0.4);
      padding:5px;
      border-radius:8px 8px 0 0;">
      <b>${title}</b>
      <button style="float:right;"
        onclick="this.parentElement.parentElement.remove()">
        X
      </button>
    </div>
    <div style="padding:10px;">
      ${content}
    </div>
  `;

  desktop.appendChild(win);

  makeDraggable(win);
}

function showWelcome(){

createWindow("Welcome",`

<h2>Cha-syuOSへようこそ‼︎</h2>

<p>
Cha-syuOSは学習用のWebOSです。<br>
Linux風のコマンドやアプリを<br>
ブラウザ上で体験できます。
</p>

<h3>Let's try terminal！</h3>

<ul>
<li>help</li>
<li>ls</li>
<li>mkdir test</li>
<li>nano file.txt</li>
<li>run app.js</li>
</ul>

`);

}

if(!localStorage.getItem("cha-syu-welcome")){

showWelcome();
localStorage.setItem("cha-syu-welcome","done");

}
    
    function openOnlineDoc(){
  createWindow("Online Document 🌐", `
    部屋ID:<br>
    <input id="roomId" placeholder="部屋ID">
    <button onclick="joinRoom()">参加</button>
    <br><br>
    <textarea id="sharedNote" style="width:100%; height:150px;"></textarea>
  `);
}
    
  function makeDraggable(element){

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  const header = element.querySelector(".window-header");

  header.style.touchAction = "none"; // ← これ超重要

  // ===== マウス =====
  header.addEventListener("mousedown", function(e){
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
  });

  document.addEventListener("mousemove", function(e){
    if(!isDragging) return;
    element.style.left = (e.clientX - offsetX) + "px";
    element.style.top  = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", function(){
    isDragging = false;
  });

  // ===== タッチ =====
  header.addEventListener("touchstart", function(e){
    isDragging = true;
    offsetX = e.touches[0].clientX - element.offsetLeft;
    offsetY = e.touches[0].clientY - element.offsetTop;
  }, { passive:false });

  document.addEventListener("touchmove", function(e){
    if(!isDragging) return;
    e.preventDefault();
    element.style.left = (e.touches[0].clientX - offsetX) + "px";
    element.style.top  = (e.touches[0].clientY - offsetY) + "px";
  }, { passive:false });

  document.addEventListener("touchend", function(){
    isDragging = false;
  });
}

  function openSettings(){

  createWindow("Settings ⚙️", `
    
    <h3>Theme</h3>
    <button onclick="setDark()">Dark</button>
    <button onclick="setLight()">Light</button>
    <br><br>

    <h3>Window Opacity</h3>
    <input type="range" min="0.3" max="1" step="0.1"
      onchange="setOpacity(this.value)">
    <br><br>

    <h3>Password</h3>
    <input type="text" id="newPass" placeholder="New password">
    <button onclick="changePassword()">Change</button>
    <br><br>

    <h3>System</h3>
    <button onclick="resetOS()">Factory Reset</button>

  `);
}

  // テーマ
function setDark(){
  desktop.style.background="linear-gradient(135deg,#0f2027,#203a43,#2c5364)";
  localStorage.setItem("theme","dark");
}

function setLight(){
  desktop.style.background="linear-gradient(135deg,#e0eafc,#cfdef3)";
  localStorage.setItem("theme","light");
}

// 透明度
function setOpacity(value){
  document.querySelectorAll(".window").forEach(w=>{
    w.style.background="rgba(255,255,255,"+value+")";
  });
  localStorage.setItem("opacity",value);
}

// パスワード変更
function changePassword(){
  var newPass=document.getElementById("newPass").value;
  if(newPass){
    localStorage.setItem("password",newPass);
    alert("Password changed!");
  }
}

// 初期化
function resetOS(){
  if(confirm("全部消えるけどいい？")){
    localStorage.clear();
    location.reload();
  }
}
  function login(){
  var savedPass = localStorage.getItem("password") || "ramen";

  if(document.getElementById("password").value === savedPass){
    loginScreen.style.display="none";
    desktop.style.display="block";
    loadSaved();
  }else{
    alert("Wrong password");
  }
}
  
function openNotepad(){
  var content=localStorage.getItem("note")||"";
  createWindow("Notepad","<textarea id='noteArea' style='width:100%;height:100px;'>"+content+"</textarea><br><button onclick='saveNote()'>Save</button>");
}

function saveNote(){
  localStorage.setItem("note",document.getElementById("noteArea").value);
  alert("Saved!");
}

// ------------------ Wallpaper & Logo ------------------
function setWallpaper(event){
  if(desktop.style.display === "block"){ // デスクトップ表示中のみ
    var reader=new FileReader();
    reader.onload=function(){
      desktop.style.background="url("+reader.result+") center/cover";
      localStorage.setItem("wall", reader.result);
    };
    reader.readAsDataURL(event.target.files[0]);
  }
}

function setLogo(event){
  var reader=new FileReader();
  reader.onload=function(){
    document.getElementById("logoImage").src=reader.result;
    localStorage.setItem("logo",reader.result);
  };
  reader.readAsDataURL(event.target.files[0]);
}

function loadSaved(){
  var savedWall=localStorage.getItem("wall");
  if(savedWall){desktop.style.background="url("+savedWall+") center/cover";}
  var savedLogo=localStorage.getItem("logo");
  if(savedLogo){document.getElementById("logoImage").src=savedLogo;}
}

// ------------------ Clock ------------------
function updateClock(){
  var now = new Date();
  document.getElementById("clock").innerHTML=
    now.getFullYear()+"/"+
    String(now.getMonth()+1).padStart(2,'0')+"/"+
    String(now.getDate()).padStart(2,'0')+" "+
    String(now.getHours()).padStart(2,'0')+":"+
    String(now.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();

// ------------------ Start Menu ------------------
function toggleStart(){
  var menu=document.getElementById("startMenu");
  menu.style.display=(menu.style.display==="block")?"none":"block";
}

function openAbout(){alert("cha-syuOS v0.5\nMade by FFox\nSpecial thanks\nChatGPT&Github");}

// ------------------ ゲーム統合 ------------------
</script>

 <script src="filesystem.js"></script>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkd16_UYRxWrgsHrNfgOt7bcm8cpBGxcA",
  authDomain: "cha-syu-os.firebaseapp.com",
  databaseURL: "https://cha-syu-os-default-rtdb.firebaseio.com/",
  projectId: "cha-syu-os",
  storageBucket: "cha-syu-os.firebasestorage.app",
  messagingSenderId: "740974024625",
  appId: "1:740974024625:web:5d5de1e9ff4b95cac70f90"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

    let currentRoom = "";
let roomRef = null;
let unsubscribe = null;
    
window.joinRoom = function(){

  const roomInput = document.getElementById("roomId").value;
  const note = document.getElementById("sharedNote");

  if(!roomInput || !note){
    alert("部屋IDを入れて！");
    return;
  }

  if(unsubscribe){
    unsubscribe();
  }

  currentRoom = roomInput;
  roomRef = ref(db, "rooms/" + currentRoom + "/text");

  note.oninput = () => {
    set(roomRef, note.value);
  };

  unsubscribe = onValue(roomRef, (snapshot) => {
    note.value = snapshot.val() || "";
  });

  alert(currentRoom + " に参加！");
};
    
</script>
  
</body>
